<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/styles/main.css">
</head>

<body>
    <header class="hero--section section">
        <div class="hero-topsection">
            <div class="newrelease--block">
                <div class="newrelease--badge">
                    <span class="newrelease--badge_icon">New</span>
                    <span class="newrelease--badge_text">Rect-Text Effect</span>
                </div>
            </div>
            <div class=" hero--heading_block">
                <h1 class="hero--heading">The Visual Effects Engine for <span class="scope--text">Designers</span></h1>
                <p class="hero--subheading">High end WebGL and motion systems made for Framer power users.</p>
            </div>
            <div class="hero--cta_block">
                <div class="hero--cta_wrapper">
                    <a href="#" class="hero--cta main-cta">Get Started</a>
                    <a href="#" class="hero--cta secondary-cta">Star on Github</a>
                </div>
            </div>
        </div>
        <div class="showcase--stills_block">
            <div class="cards-container">
                <div class="cards-wrapper upslide">
                    <div class="item"></div>
                    <div class="item"></div>
                    <div class="item"></div>
                </div>
                <div class="cards-wrapper downslide">
                    <div class="item"></div>
                    <div class="item"></div>
                    <div class="item"></div>
                </div>
                <div class="cards-wrapper upslide">
                    <div class="item"></div>
                    <div class="item"></div>
                    <div class="item"></div>
                </div>
                <div class="cards-wrapper downslide">
                    <div class="item"></div>
                    <div class="item"></div>
                    <div class="item"></div>
                </div>
                <div class="cards-wrapper upslide">
                    <div class="item"></div>
                    <div class="item"></div>
                    <div class="item"></div>
                </div>
            </div>
        </div>
        <canvas class="hero--canvas" id="shader-canvas"></canvas>
    </header>
</body>

<script type="module" src="./src/main.js"></script>

</html>
